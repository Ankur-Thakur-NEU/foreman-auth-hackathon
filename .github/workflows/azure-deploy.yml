# Skeleton: deploy TokenForeman to Azure App Service.
# Configure secrets: AZURE_WEBAPP_PUBLISH_PROFILE (or AZURE_CREDENTIALS) and set AZURE_WEBAPP_NAME.
name: Azure Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: ''   # set in repo variables or secrets, e.g. tokenforeman
  AZURE_WEBAPP_PACKAGE_PATH: 'TokenForeman'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore TokenForeman/TokenForeman.csproj

      - name: Build
        run: dotnet build TokenForeman/TokenForeman.csproj --no-restore -c Release

      - name: Publish
        run: dotnet publish TokenForeman/TokenForeman.csproj -c Release -o ./publish --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
